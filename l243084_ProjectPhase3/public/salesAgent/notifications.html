<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications | Sales Agent CRM</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px; background-color: var(--maroon-dark); color: var(--white);
      padding: 30px 0; position: fixed; top: 0; left: 0;
      height: 100vh; overflow-y: auto; z-index: 100;
    }
    .sidebar-logo {
      font-size: 22px; font-weight: 800; padding: 0 25px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: var(--white); text-decoration: none; display: block;
    }
    .sidebar-logo span { color: var(--pink-border); }
    .sidebar-menu { padding: 20px 0; }
    .menu-label {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4);
      padding: 10px 25px 5px; text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px; padding: 13px 25px;
      color: rgba(255,255,255,0.8); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: all 0.2s;
    }
    .menu-item:hover, .menu-item.active {
      background-color: rgba(255,255,255,0.1); color: var(--white);
      border-left: 3px solid var(--pink-border);
    }
    .menu-item .icon { font-size: 18px; }

    /* Main */
    .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }

    /* Topbar */
    .topbar {
      background-color: var(--white); padding: 18px 35px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--pink-border); position: sticky; top: 0; z-index: 99;
    }
    .topbar h1 { font-size: 22px; font-weight: 700; color: var(--maroon-dark); }
    .topbar-right { display: flex; align-items: center; gap: 15px; }
    .logout-btn {
      background-color: var(--maroon-dark); color: var(--white);
      border: none; padding: 9px 18px; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s;
    }
    .logout-btn:hover { background-color: var(--maroon-hover); }

    /* Content */
    .content { padding: 35px; flex: 1; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .page-header h2 { font-size: 20px; font-weight: 700; color: var(--maroon-dark); }

    /* Buttons */
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background-color: var(--maroon-dark); color: var(--white); }
    .btn-primary:hover { background-color: var(--maroon-hover); }
    .btn-danger { background-color: var(--error); color: var(--white); padding: 6px 12px; font-size: 12px; }
    .btn-success { background-color: var(--success); color: var(--white); padding: 6px 12px; font-size: 12px; }
    .btn-cancel { background-color: var(--gray-light); color: var(--black); padding: 10px 20px; }

    /* Table */
    .section-card {
      background-color: var(--white); border-radius: 15px;
      border: 1px solid var(--pink-border); box-shadow: 0 3px 15px var(--shadow); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background-color: var(--pink-bg); }
    th { padding: 14px 18px; text-align: left; font-size: 13px; font-weight: 600; color: var(--maroon-dark); }
    td { padding: 14px 18px; font-size: 13px; color: var(--black); border-bottom: 1px solid var(--pink-border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background-color: var(--pink-bg); }

    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-gray { background: var(--gray-light); color: var(--gray); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px; padding: 30px;
      width: 480px; max-width: 95vw;
      border: 1px solid var(--pink-border); box-shadow: 0 10px 40px var(--shadow);
    }
    .modal h2 { font-size: 18px; font-weight: 700; color: var(--maroon-dark); margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--black); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--pink-border); border-radius: 8px;
      font-size: 14px; outline: none; font-family: 'Poppins', sans-serif;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--maroon-dark); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
    .empty-state div { font-size: 48px; margin-bottom: 12px; }
    .action-cell { display: flex; gap: 6px; }
  </style>
</head>
<body>

<div class="sidebar">
  <a href="dashboard.html" class="sidebar-logo">🎯 Sales<span>Agent</span></a>
  <div class="sidebar-menu">
    <div class="menu-label">CRM</div>
    <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
    <a href="leads.html" class="menu-item"><span class="icon">🎯</span> My Leads</a>
    <a href="opportunities.html" class="menu-item"><span class="icon">💼</span> My Opportunities</a>
    <a href="contacts.html" class="menu-item"><span class="icon">👤</span> Contacts</a>
    <a href="activities.html" class="menu-item"><span class="icon">📋</span> Activities</a>
    <a href="tickets.html" class="menu-item"><span class="icon">🎫</span> My Tickets</a>
    <div class="menu-label">Tools</div>
    <a href="notifications.html" class="menu-item active"><span class="icon">🔔</span> Notifications</a>
    <a href="emailIntegrations.html" class="menu-item"><span class="icon">📧</span> Email Integrations</a>
    <a href="leadConversions.html" class="menu-item"><span class="icon">🔄</span> Lead Conversions</a>
    <div class="menu-label">Account</div>
    <a href="#" class="menu-item" onclick="logout()"><span class="icon">🚪</span> Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>🔔 My Notifications</h1>
    <div class="topbar-right">
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="content">
    <div class="page-header">
      <h2>Your Notifications</h2>
      <button class="btn btn-primary" onclick="openModal()">+ Add Notification</button>
    </div>

    <div class="section-card">
      <table>
        <thead>
          <tr><th>Title</th><th>Type</th><th>Message</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        </thead>
        <tbody id="notifTable">
          <tr><td colspan="6"><div class="empty-state"><div>🔔</div>Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add Notification</h2>
    <div class="form-group"><label>Title</label><input type="text" id="title" placeholder="Title" /></div>
    <div class="form-group"><label>Message</label><textarea id="message" rows="3" placeholder="Message"></textarea></div>
    <div class="form-group"><label>Type</label>
      <select id="notification_type">
        <option value="system">System</option>
        <option value="task_due">Task Due</option>
        <option value="ticket_assigned">Ticket Assigned</option>
        <option value="lead_assigned">Lead Assigned</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addNotification()">Add</button>
    </div>
  </div>
</div>

<script>
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const userId = user.user_id || 1;
  const tenantId = user.tenant_id || 1;

  async function loadNotifications() {
    try {
      const res = await fetch(`http://localhost:3000/notifications/user/${userId}`);
      const data = await res.json();
      const tbody = document.getElementById('notifTable');
      if (!data.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div>🔔</div>No notifications</div></td></tr>'; return; }
      tbody.innerHTML = data.map(n => `
        <tr>
          <td><strong>${n.title}</strong></td>
          <td><span class="badge badge-blue">${n.notification_type}</span></td>
          <td>${n.message||'-'}</td>
          <td><span class="badge ${n.is_read?'badge-gray':'badge-green'}">${n.is_read?'Read':'Unread'}</span></td>
          <td>${new Date(n.created_at).toLocaleDateString()}</td>
          <td class="action-cell">
            ${!n.is_read?`<button class="btn btn-success" onclick="markRead(${n.notification_id})">✓ Read</button>`:''}
            <button class="btn btn-danger" onclick="deleteNotif(${n.notification_id})">🗑</button>
          </td>
        </tr>`).join('');
    } catch(err) { console.error(err); }
  }
  async function markRead(id) { await fetch(`http://localhost:3000/notifications/read/${id}`, {method:'PUT'}); loadNotifications(); }
  async function deleteNotif(id) { if(!confirm('Delete?')) return; await fetch(`http://localhost:3000/notifications/delete/${id}`, {method:'DELETE'}); loadNotifications(); }
  async function addNotification() {
    const body = {
      tenant_id: tenantId, user_id: userId,
      title: document.getElementById('title').value,
      message: document.getElementById('message').value,
      notification_type: document.getElementById('notification_type').value,
      related_type: 'other'
    };
    await fetch('http://localhost:3000/notifications/add', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    closeModal(); loadNotifications();
  }
  function openModal() { document.getElementById('modal').classList.add('open'); }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  function logout() { window.location.href = '../../login.html'; }
  loadNotifications();
</script>
</body>
</html>
