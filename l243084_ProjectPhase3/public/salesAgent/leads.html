<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Leads — Sales Agent</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    .sidebar { width:260px;background:var(--maroon-dark);position:fixed;height:100vh;padding:30px 0;overflow-y:auto; }
    .sidebar-logo { font-size:22px;color:white;padding:0 25px 30px;display:block;text-decoration:none;font-weight:800;border-bottom:1px solid rgba(255,255,255,0.1); }
    .sidebar-logo span { color:var(--pink-border); }
    .menu-label { font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);padding:10px 25px 5px;text-transform:uppercase;letter-spacing:1px; }
    .menu-item { display:flex;align-items:center;gap:12px;padding:13px 25px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;transition:0.2s; }
    .menu-item:hover,.menu-item.active { background:rgba(255,255,255,0.1);border-left:3px solid var(--pink-border);color:white; }
    .main { margin-left:260px;display:flex;flex-direction:column;min-height:100vh; }
    .topbar { background:var(--white);padding:18px 35px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--pink-border);position:sticky;top:0;z-index:99; }
    .topbar h1 { font-size:22px;font-weight:700;color:var(--maroon-dark); }
    .topbar-right { display:flex;align-items:center;gap:15px; }
    .user-info { text-align:right;font-size:13px; }
    .user-info strong { display:block;color:var(--maroon-dark);font-weight:700; }
    .user-info span { color:var(--gray); }
    .logout-btn { background:var(--maroon-dark);color:white;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600; }
    .logout-btn:hover { background:var(--maroon-hover); }
    .content { padding:35px; }
    .page-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:25px; }
    .page-header h2 { font-size:24px;font-weight:700;color:var(--maroon-dark); }
    .success-msg { background:#d4edda;color:#155724;padding:12px 18px;border-radius:8px;font-size:14px;margin-bottom:20px;display:none; }
    .table-card { background:var(--white);border-radius:15px;border:1px solid var(--pink-border);box-shadow:0 3px 15px var(--shadow);overflow:hidden; }
    .table-toolbar { padding:18px 25px;border-bottom:1px solid var(--pink-border);display:flex;gap:10px;align-items:center;flex-wrap:wrap; }
    .search-input { padding:9px 15px;border:2px solid var(--pink-border);border-radius:8px;font-size:14px;outline:none;width:240px; }
    .search-input:focus { border-color:var(--maroon-dark); }
    .filter-select { padding:9px 15px;border:2px solid var(--pink-border);border-radius:8px;font-size:14px;outline:none;background:var(--pink-bg); }
    .data-table { width:100%;border-collapse:collapse; }
    .data-table thead { background:var(--pink-bg); }
    .data-table thead th { padding:14px 18px;font-size:13px;font-weight:600;color:var(--maroon-dark);text-align:left; }
    .data-table tbody tr { border-bottom:1px solid var(--pink-border);transition:background 0.2s; }
    .data-table tbody tr:hover { background:var(--pink-bg); }
    .data-table tbody td { padding:14px 18px;font-size:13px;color:var(--black); }
    .action-btn { padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;margin-right:4px; }
    .btn-edit { background:var(--pink-light);color:var(--maroon-dark); }
    .modal-overlay { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--white);border-radius:15px;padding:35px;width:540px;max-width:95%;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto; }
    .modal h3 { font-size:20px;font-weight:700;color:var(--maroon-dark);margin-bottom:20px; }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:15px; }
    .form-group { margin-bottom:15px; }
    .form-group label { display:block;font-size:13px;font-weight:600;color:var(--maroon-dark);margin-bottom:6px; }
    .form-group input,.form-group select,.form-group textarea { width:100%;padding:11px 15px;border:2px solid var(--pink-border);border-radius:8px;font-size:14px;outline:none;background:var(--pink-bg); }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--maroon-dark);background:white; }
    .form-group textarea { resize:vertical;min-height:75px; }
    .modal-btns { display:flex;gap:10px;margin-top:20px;justify-content:flex-end; }
    .btn-cancel { padding:10px 20px;border:2px solid var(--maroon-dark);background:transparent;color:var(--maroon-dark);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600; }
  </style>
</head>
<body>

<div class="sidebar">
  <a href="dashboard.html" class="sidebar-logo">🎯 Sales<span>Agent</span></a>
  <div class="sidebar-menu">
    <div class="menu-label">Main</div>
    <a href="dashboard.html" class="menu-item">📊 Dashboard</a>
    <div class="menu-label">CRM</div>
    <a href="leads.html"         class="menu-item active">🎯 My Leads</a>
    <a href="opportunities.html" class="menu-item">💼 My Opportunities</a>
    <a href="contacts.html"      class="menu-item">👤 Contacts</a>
    <a href="activities.html"    class="menu-item">📋 Activities</a>
    <a href="tickets.html"       class="menu-item">🎫 My Tickets</a>
    <div class="menu-label">Account</div>
    <a href="#" class="menu-item" onclick="logout()">
    <a href="notifications.html"    class="menu-item">🔔 Notifications</a>
    <a href="emailIntegrations.html" class="menu-item">📧 Email Integrations</a>
    <a href="leadConversions.html"   class="menu-item">🔄 Lead Conversions</a>🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>🎯 My Leads</h1>
    <div class="topbar-right">
      <div class="user-info">
        <strong id="userName">Loading...</strong>
        <span>Sales Agent</span>
      </div>
      <button class="logout-btn" onclick="logout()">
    <a href="notifications.html"    class="menu-item">🔔 Notifications</a>
    <a href="emailIntegrations.html" class="menu-item">📧 Email Integrations</a>
    <a href="leadConversions.html"   class="menu-item">🔄 Lead Conversions</a>🚪 Logout</button>
    </div>
  </div>

  <div class="content">
    <div class="page-header">
      <h2>My Assigned Leads</h2>
      <button class="btn-primary" onclick="openModal()">➕ Log New Lead</button>
    </div>

    <div class="success-msg" id="successMsg"></div>

    <div class="table-card">
      <div class="table-toolbar">
        <input type="text" class="search-input" placeholder="🔍 Search leads..." oninput="filterTable(this.value)">
        <select class="filter-select" onchange="filterByStatus(this.value)">
          <option value="">All Status</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="qualified">Qualified</option>
          <option value="disqualified">Disqualified</option>
          <option value="converted">Converted</option>
        </select>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Email</th><th>Company</th>
            <th>Source</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="leadsTable">
          <tr><td colspan="7" style="text-align:center;padding:30px;color:var(--gray)">⏳ Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">➕ Add New Lead</h3>
    <input type="hidden" id="editLeadId">
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="First name">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Last name">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="lead@company.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="+92 300 0000000">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Company</label>
        <input type="text" id="company" placeholder="Company name">
      </div>
      <div class="form-group">
        <label>Source</label>
        <select id="source">
          <option value="web">Web</option>
          <option value="referral">Referral</option>
          <option value="cold_call">Cold Call</option>
          <option value="social_media">Social Media</option>
          <option value="event">Event</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="status">
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="qualified">Qualified</option>
        <option value="disqualified">Disqualified</option>
        <option value="converted">Converted</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="notes" placeholder="Any additional notes..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveLead()">💾 Save Lead</button>
    </div>
  </div>
</div>

<script>
  const BASE = 'http://localhost:3000';
  let allLeads = [];

  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user || user.role !== 'sales_agent') {
    window.location.href = '../login.html';
  } else {
    document.getElementById('userName').textContent = user.first_name + ' ' + user.last_name;
  }

  async function loadLeads() {
    try {
      const res = await fetch(`${BASE}/leads/agent/${user.user_id}`);
      allLeads  = await res.json();
      renderTable(allLeads);
    } catch(err) {
      document.getElementById('leadsTable').innerHTML =
        '<tr><td colspan="7" style="text-align:center;color:red">❌ Failed to load</td></tr>';
    }
  }

  function statusColor(s) {
    if (s==='qualified'||s==='converted') return 'success';
    if (s==='disqualified') return 'error';
    if (s==='contacted')    return 'warning';
    return 'maroon';
  }

  function renderTable(data) {
    if (!data.length) {
      document.getElementById('leadsTable').innerHTML =
        '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--gray)">No leads found</td></tr>';
      return;
    }
    document.getElementById('leadsTable').innerHTML = data.map((l, i) => `
      <tr>
        <td>${i+1}</td>
        <td><strong>${l.first_name} ${l.last_name}</strong></td>
        <td>${l.email||'-'}</td>
        <td>${l.company||'-'}</td>
        <td><span class="badge badge-maroon">${l.source}</span></td>
        <td><span class="badge badge-${statusColor(l.status)}">${l.status}</span></td>
        <td>
          <button class="action-btn btn-edit" onclick="editLead(${l.lead_id})">✏️ Edit Status</button>
        </td>
      </tr>`).join('');
  }

  function filterTable(val) {
    renderTable(allLeads.filter(l =>
      (l.first_name+' '+l.last_name).toLowerCase().includes(val.toLowerCase()) ||
      (l.company||'').toLowerCase().includes(val.toLowerCase())
    ));
  }

  function filterByStatus(val) {
    renderTable(val ? allLeads.filter(l => l.status === val) : allLeads);
  }

  function openModal() {
    document.getElementById('modalTitle').textContent = '➕ Add New Lead';
    document.getElementById('editLeadId').value = '';
    document.getElementById('firstName').value  = '';
    document.getElementById('lastName').value   = '';
    document.getElementById('email').value      = '';
    document.getElementById('phone').value      = '';
    document.getElementById('company').value    = '';
    document.getElementById('notes').value      = '';
    document.getElementById('modalOverlay').classList.add('show');
  }

  function editLead(id) {
    const l = allLeads.find(x => x.lead_id === id);
    if (!l) return;
    document.getElementById('modalTitle').textContent = '✏️ Update Lead Status';
    document.getElementById('editLeadId').value = l.lead_id;
    document.getElementById('firstName').value  = l.first_name;
    document.getElementById('lastName').value   = l.last_name;
    document.getElementById('email').value      = l.email||'';
    document.getElementById('phone').value      = l.phone||'';
    document.getElementById('company').value    = l.company||'';
    document.getElementById('source').value     = l.source;
    document.getElementById('status').value     = l.status;
    document.getElementById('notes').value      = l.notes||'';
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  async function saveLead() {
    const editId = document.getElementById('editLeadId').value;
    const body = {
      first_name:       document.getElementById('firstName').value.trim(),
      last_name:        document.getElementById('lastName').value.trim(),
      email:            document.getElementById('email').value.trim(),
      phone:            document.getElementById('phone').value.trim(),
      company:          document.getElementById('company').value.trim(),
      source:           document.getElementById('source').value,
      status:           document.getElementById('status').value,
      notes:            document.getElementById('notes').value.trim(),
      tenant_id:        user.tenant_id,
      assigned_user_id: user.user_id
    };
    if (!body.first_name || !body.last_name) { alert('First and last name required!'); return; }

    const url    = editId ? `${BASE}/leads/update/${editId}` : `${BASE}/leads/add`;
    const method = editId ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    closeModal();
    showSuccess(editId ? '✅ Lead updated!' : '✅ Lead added!');
    loadLeads();
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function logout() { localStorage.removeItem('user'); window.location.href = '../login.html'; }

  loadLeads();
</script>
</body>
</html>
